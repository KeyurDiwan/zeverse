# Example workflow written for one specific product repo (heavy Jest setup). To use it elsewhere:
# - Copy under YOUR repo as `.zeverse/workflows/<name>.yaml`; adjust shell commands (npm/yarn/pnpm),
#   install flags, and test runners to match your project.
# - Set that repo's `defaultBranch` in hub `repos.json` (or the UI Import) before running against it.
#
# Originally: sync into a target repo as `.zeverse/workflows/test.yaml` on the branch Zeverse uses
# as `defaultBranch` for that repo. Zeverse clones have no `node_modules` — install in a shell step first.
# After pushing upstream, refresh the hub workflow cache if needed (see bottom).
name: test
description: Run Jest (optionally scoped) and summarise failures with suggested fixes.
inputs:
  - id: pattern
    label: Test path pattern (e.g. src/pages/billing, leave blank for all)
    required: false
steps:
  # ubx-ui needs --legacy-peer-deps. Try ci when a lockfile exists; fall back if it is out of sync with package.json.
  - id: install
    kind: shell
    command: |
      if [ -f package-lock.json ]; then
        npm ci --legacy-peer-deps || npm install --legacy-peer-deps
      else
        npm install --legacy-peer-deps
      fi

  # Use project's Jest (from node_modules), not `npx jest` which can download Jest 30+ without jsdom.
  - id: jest
    kind: shell
    command: |
      if [ -n "{{inputs.pattern}}" ]; then
        npm exec -- jest --watchAll=false --passWithNoTests --colors=false "{{inputs.pattern}}"
      else
        npm exec -- jest --watchAll=false --passWithNoTests --colors=false
      fi
    continueOnError: true

  - id: summarise
    kind: llm
    prompt: |
      Jest output for UBX UI:

      {{steps.jest.output}}

      Produce:
      1. PASS / FAIL summary (totals: suites, tests, time).
      2. For each failing test:
         - Test name and file path.
         - One-line root cause (based on the stack + assertion).
         - Concrete suggested fix (code, config, or test change).
      3. Flaky / slow tests worth attention.
      4. If everything passed, say so in one line.

# After updating this file on GitHub, either wait ~60s for workflow cache TTL or:
#   curl -X POST "http://127.0.0.1:3100/api/repos/ubx-ui/refresh-workflows"
