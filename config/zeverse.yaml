llm:
  provider: custom
  model: anthropic-claude-4-6-opus
  base_url: ${CLOUDVERSE_BASE_URL}
  api_key: ${CLOUDVERSE_API_KEY}
  max_tokens: 8192
  temperature: 0.2

runner:
  timeout_ms: 300000
  # milestone_steps: ["plan", "implement", "validate", "review", "open-pr"]

paths:
  repos_file: repos.json
  state_dir: state
  clone_dir: repos

# Code intelligence index (Postgres + pgvector). Set POSTGRES_URL and enable when ready.
index:
  enabled: false
  postgres_url: ${POSTGRES_URL}
  embedding:
    provider: cloudverse
    model: text-embedding-3-small
    dim: 1536
  chunking:
    max_lines: 80
    max_tokens: 2500
  retrieval:
    top_k: 12
    expand: imports+callers
    max_chars: 80000
    hybrid_weights:
      vector: 0.7
      bm25: 0.3
  watcher:
    poll_seconds: 300
    on_repo_add: true

# Uncomment to restrict which repos, workflows, and Slack channels can trigger runs.
# policy:
#   allowed_repos: ["*"]
#   allowed_workflows: ["*"]
#   allowed_slack_channels: ["*"]
