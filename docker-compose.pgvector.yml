version: "3.8"
# Dev-only Postgres + pgvector for Zeverse code index.
# Usage: docker compose -f docker-compose.pgvector.yml up -d
services:
  pgvector:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: zeverse
      POSTGRES_PASSWORD: zeverse
      POSTGRES_DB: zeverse
    ports:
      - "5432:5432"
    volumes:
      - zeverse_pg:/var/lib/postgresql/data

volumes:
  zeverse_pg:
